name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Chrono.slnx

      - name: Build
        run: dotnet build Chrono.slnx --no-restore -c Release

      - name: Test
        run: dotnet test tests/Chrono.TimeSeries.Test/Chrono.TimeSeries.Test.csproj --no-build -c Release --logger "trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
